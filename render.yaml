# Render Blueprint for the full stack.
#
# Four services, one repo:
#   - sudoku-api        FastAPI + PuLP/CBC LP solver (CPU-bound, Web Service)
#   - canvas-api        FastAPI + httpx wrapper over Canvas REST (I/O-bound, Web Service)
#   - sudoku-web        Vite/React student SPA (static site, free)
#   - canvas-web        Vite/React teacher SPA (static site, free)
#
# Render's current Blueprint spec uses `type: web` for everything that
# serves traffic, with `runtime: static` to opt a service into the
# static-site configuration. The older `type: static` / `env: python`
# spelling is no longer accepted.

services:
  - type: web
    name: sudoku-api
    runtime: python
    plan: starter                   # $7/mo, always on (no cold starts)
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /api/health
    envVars:
      - key: SUDOKU_ALLOWED_ORIGINS
        sync: false                 # set to the sudoku-web URL in the Render dashboard

  - type: web
    name: canvas-api
    runtime: python
    plan: starter                   # $7/mo, always on (no cold starts)
    rootDir: backend-canvas
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /api/health
    envVars:
      - key: CANVAS_BASE_URL
        value: https://canvas.instructure.com
      - key: CANVAS_ALLOWED_ORIGINS
        sync: false                 # set per-env in the Render dashboard

  - type: web
    name: sudoku-web
    runtime: static
    rootDir: frontend
    buildCommand: npm ci && npm run build
    staticPublishPath: ./dist
    envVars:
      # Render may append a hash to service hostnames if the base name is
      # taken (e.g. sudoku-api-abcd.onrender.com). Set the real URL in the
      # dashboard and trigger a Manual Deploy so Vite re-inlines it.
      - key: VITE_API_URL
        sync: false
    routes:
      - type: rewrite
        source: /*
        destination: /index.html

  - type: web
    name: canvas-web
    runtime: static
    rootDir: frontend-canvas
    buildCommand: npm ci && npm run build
    staticPublishPath: ./dist
    envVars:
      - key: VITE_API_URL
        sync: false
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
